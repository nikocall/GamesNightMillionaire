<script>
/* ── QUESTION LOADER ── */
let loadedQuestions = null;   // null = nothing loaded yet

function parseQuestions(text) {
  const lines = text.split('\n').map(l => l.trim());
  const result = [];
  let block = [];

  for (const line of lines) {
    if (line.startsWith('#')) continue;
    if (line === '') {
      if (block.length >= 5) result.push({ q: block[0], correct: block[1], wrong: [block[2], block[3], block[4]] });
      block = [];
    } else {
      block.push(line);
    }
  }
  if (block.length >= 5) result.push({ q: block[0], correct: block[1], wrong: [block[2], block[3], block[4]] });
  return result;
}

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const qs = parseQuestions(ev.target.result);
    if (qs.length < 1) {
      document.getElementById('loadStatus').style.color = '#f88';
      document.getElementById('loadStatus').textContent = '⚠ No valid questions found — check the file format.';
      return;
    }
    loadedQuestions = qs;
    document.getElementById('loadStatus').style.color = '#5c8';
    document.getElementById('loadStatus').textContent = `✓ Loaded ${qs.length} question${qs.length !== 1 ? 's' : ''} — ready!`;
    setTimeout(startGame, 900);
  };
  reader.readAsText(file);
});

function useBuiltIn() {
  loadedQuestions = QUESTIONS;
  startGame();
}

/* ── PRIZE TABLE ── */
const PRIZES = [
  { amount: '$100',       milestone: false },
  { amount: '$200',       milestone: false },
  { amount: '$300',       milestone: false },
  { amount: '$500',       milestone: false },
  { amount: '$1,000',     milestone: true  },
  { amount: '$2,000',     milestone: false },
  { amount: '$4,000',     milestone: false },
  { amount: '$8,000',     milestone: false },
  { amount: '$16,000',    milestone: false },
  { amount: '$32,000',    milestone: true  },
  { amount: '$64,000',    milestone: false },
  { amount: '$125,000',   milestone: false },
  { amount: '$250,000',   milestone: false },
  { amount: '$500,000',   milestone: false },
  { amount: '$1,000,000', milestone: true  },
];

const MILESTONES = [4, 9];

/* ── AUDIO ── */
const sndBackground = document.getElementById('audioBackground');
const sndCorrect    = document.getElementById('audioCorrect');
const sndWrong      = document.getElementById('audioWrong');
const sndWin        = document.getElementById('audioWin');

let muted = false;

function playSound(el) {
  if (muted) return;
  el.currentTime = 0;
  el.play().catch(() => {});   // ignore autoplay policy errors silently
}

function stopSound(el) {
  el.pause();
  el.currentTime = 0;
}

function startBackground() {
  if (muted) return;
  sndBackground.volume = 0.35;
  sndBackground.play().catch(() => {});
}

function stopBackground() {
  sndBackground.pause();
  sndBackground.currentTime = 0;
}

function toggleMute() {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
  if (muted) {
    sndBackground.pause();
  } else {
    // Only restart background if we're on the game screen
    if (document.getElementById('gameScreen').classList.contains('active')) {
      sndBackground.play().catch(() => {});
    }
  }
}

/* ── STATE ── */
let gameQuestions  = [];
let currentQ       = 0;
let answered       = false;
let selectedIndex  = null;
let removedIndices = [];
let lifelines      = {};

/* ── HELPERS ── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function closeOverlay(id) {
  document.getElementById(id).classList.remove('show');
}

/* ── START GAME ── */
function startGame() {
  const pool    = loadedQuestions || QUESTIONS;
  gameQuestions = shuffle(pool).slice(0, Math.min(15, pool.length));
  currentQ       = 0;
  answered       = false;
  selectedIndex  = null;
  removedIndices = [];
  lifelines      = { '5050': false, phone: false, audience: false };

  ['ll5050','llPhone','llAudience'].forEach(id =>
    document.getElementById(id).classList.remove('used')
  );

  buildLadder();
  showScreen('gameScreen');
  startBackground();
  renderQuestion();
}

/* ── PRIZE LADDER ── */
function buildLadder() {
  const ladder = document.getElementById('prizeLadder');
  ladder.innerHTML = '';
  const total = gameQuestions.length;
  for (let i = total - 1; i >= 0; i--) {
    const div = document.createElement('div');
    div.id = `prize-${i}`;
    div.className = 'prize-item' + (PRIZES[i].milestone ? ' milestone' : '');
    div.innerHTML = `<span class="prize-num">${i + 1}</span>${PRIZES[i].amount}`;
    ladder.appendChild(div);
  }
  updateLadder();
}

function updateLadder() {
  for (let i = 0; i < gameQuestions.length; i++) {
    const el = document.getElementById(`prize-${i}`);
    if (!el) continue;
    el.classList.remove('current', 'reached');
    if (i < currentQ) el.classList.add('reached');
    if (i === currentQ) el.classList.add('current');
  }
}

/* ── RENDER QUESTION ── */
function renderQuestion() {
  answered       = false;
  selectedIndex  = null;
  removedIndices = [];

  const qData = gameQuestions[currentQ];
  document.getElementById('qNumber').textContent =
    `Question ${currentQ + 1} of ${gameQuestions.length}`;
  document.getElementById('questionText').textContent = qData.q;

  const shuffled     = shuffle([qData.correct, ...qData.wrong]);
  const correctIndex = shuffled.indexOf(qData.correct);

  window._answers      = shuffled;
  window._correctIndex = correctIndex;

  const grid    = document.getElementById('answersGrid');
  const letters = ['A','B','C','D'];
  grid.innerHTML = '';

  shuffled.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.id = `ans-${i}`;
    btn.innerHTML = `<span class="answer-letter">${letters[i]}</span><span>${ans}</span>`;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  updateLadder();
}

/* ── ANSWER FLOW ── */
function selectAnswer(index) {
  if (answered || removedIndices.includes(index)) return;

  if (selectedIndex === index) {
    confirmAnswer(index);
    return;
  }

  if (selectedIndex !== null)
    document.getElementById(`ans-${selectedIndex}`).classList.remove('selected');

  selectedIndex = index;
  document.getElementById(`ans-${index}`).classList.add('selected');
}

function confirmAnswer(index) {
  answered = true;
  document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);

  const correct = window._correctIndex;

  setTimeout(() => {
    if (index !== correct) {
      document.getElementById(`ans-${index}`).classList.remove('selected');
      document.getElementById(`ans-${index}`).classList.add('wrong');
    }
    document.getElementById(`ans-${correct}`).classList.remove('selected');
    document.getElementById(`ans-${correct}`).classList.add('correct');

    // Play correct / wrong sound
    if (index === correct) {
      playSound(sndCorrect);
      // Show Next Question button after a short pause
      setTimeout(() => {
        currentQ++;
        if (currentQ >= gameQuestions.length) {
          endGame('win');
        } else {
          document.getElementById('nextBtn').classList.add('visible');
          document.getElementById('walkBtn').style.display = 'none';
        }
      }, 1200);
    } else {
      stopBackground();
      playSound(sndWrong);
      setTimeout(() => endGame('lose'), 1800);
    }
  }, 600);
}

/* ── NEXT QUESTION ── */
function nextQuestion() {
  document.getElementById('nextBtn').classList.remove('visible');
  document.getElementById('walkBtn').style.display = '';
  renderQuestion();
}

/* ── WALK AWAY ── */
function walkAway() {
  if (answered) return;
  endGame('walk');
}

/* ── END GAME ── */
function endGame(result) {
  stopBackground();
  showScreen('endScreen');

  const wonPrize  = currentQ > 0 ? PRIZES[currentQ - 1].amount : '$0';
  const safePrize = (() => {
    let safe = '$0';
    for (const m of MILESTONES) if (currentQ > m) safe = PRIZES[m].amount;
    return safe;
  })();

  if (result === 'win') {
    document.getElementById('endTitle').textContent = 'Congratulations!';
    document.getElementById('endPrize').textContent = PRIZES[gameQuestions.length - 1].amount;
    document.getElementById('endMsg').textContent   = 'You answered every question correctly and won the top prize!';
    playSound(sndWin);
  } else if (result === 'walk') {
    document.getElementById('endTitle').textContent = 'You Walked Away!';
    document.getElementById('endPrize').textContent = wonPrize;
    document.getElementById('endMsg').textContent   = 'Smart move. You leave with your winnings!';
  } else {
    document.getElementById('endTitle').textContent = 'Wrong Answer!';
    document.getElementById('endPrize').textContent = safePrize;
    document.getElementById('endMsg').textContent   = `You go home with ${safePrize}. Better luck next time!`;
  }
}

/* ── LIFELINES ── */
function use5050() {
  if (lifelines['5050'] || answered) return;
  lifelines['5050'] = true;
  document.getElementById('ll5050').classList.add('used');

  const correct = window._correctIndex;
  const pool    = [0,1,2,3].filter(i => i !== correct && !removedIndices.includes(i));
  shuffle(pool).slice(0, 2).forEach(i => {
    removedIndices.push(i);
    document.getElementById(`ans-${i}`).classList.add('hidden');
  });
}

function usePhone() {
  if (lifelines.phone || answered) return;
  lifelines.phone = true;
  document.getElementById('llPhone').classList.add('used');

  const correct = window._correctIndex;
  const letters = ['A','B','C','D'];
  const names   = ['Alex','Jordan','Taylor','Morgan','Casey'];
  const name    = names[Math.floor(Math.random() * names.length)];

  const picksRight = Math.random() < 0.75;
  let picked;
  if (picksRight) {
    picked = correct;
  } else {
    const others = [0,1,2,3].filter(i => i !== correct && !removedIndices.includes(i));
    picked = others[Math.floor(Math.random() * others.length)];
  }

  const conf = Math.floor(55 + Math.random() * 40);
  const msg  = picksRight
    ? `"I'm pretty sure it's <strong>${letters[picked]}</strong>. About ${conf}% confident!"`
    : `"Hmm, tough one… I think <strong>${letters[picked]}</strong>? But I'm honestly not sure."`;

  document.getElementById('phoneText').innerHTML =
    `<strong>${name}</strong> says:<br><br>${msg}`;
  document.getElementById('phoneOverlay').classList.add('show');
}

function useAudience() {
  if (lifelines.audience || answered) return;
  lifelines.audience = true;
  document.getElementById('llAudience').classList.add('used');

  const correct = window._correctIndex;
  const visible = [0,1,2,3].filter(i => !removedIndices.includes(i));
  const pcts    = {};

  const correctPct = Math.floor(42 + Math.random() * 44);
  pcts[correct] = correctPct;
  let rem = 100 - correctPct;

  const others = visible.filter(i => i !== correct);
  others.forEach((idx, j) => {
    if (j === others.length - 1) { pcts[idx] = rem; }
    else { const s = Math.floor(Math.random() * rem * 0.6); pcts[idx] = s; rem -= s; }
  });
  removedIndices.forEach(i => pcts[i] = 0);

  const letters = ['A','B','C','D'];
  const barsEl  = document.getElementById('audienceBars');
  barsEl.innerHTML = '';

  [0,1,2,3].forEach(i => {
    if (removedIndices.includes(i)) return;
    const pct  = pcts[i] || 0;
    const wrap = document.createElement('div');
    wrap.className = 'bar-wrap';
    wrap.innerHTML = `
      <div class="bar-pct">${pct}%</div>
      <div class="bar" style="height:0" data-h="${Math.round(pct * 1.3)}"></div>
      <div class="bar-lbl">${letters[i]}</div>
    `;
    barsEl.appendChild(wrap);
  });

  document.getElementById('audienceOverlay').classList.add('show');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    barsEl.querySelectorAll('.bar').forEach(b => {
      b.style.height = b.dataset.h + 'px';
    });
  }));
}

/* ── RESET ── */
function resetGame() {
  stopBackground();
  showScreen('startScreen');
}
</script>
</body>
</html>
